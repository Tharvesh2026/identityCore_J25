<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Inter',sans-serif; background:#f9fafb; margin:0; }
        .card { max-width:400px; margin:80px auto; background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:36px; }
        h1 { font-size:20px; margin:0 0 6px; color:#111827; }
        p.sub { font-size:13.5px; color:#6b7280; margin:0 0 24px; }
        label { font-size:13px; color:#374151; display:block; margin-bottom:6px; }
        input[type=email] { width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; margin-bottom:16px; box-sizing:border-box; }
        button { width:100%; padding:11px; background:#4f46e5; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; }
        .back { display:block; text-align:center; margin-top:18px; font-size:13px; color:#4f46e5; text-decoration:none; }
        .error { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:16px; }
    </style>
</head>
<body>
<div class="card">
    <h1>Forgot your password?</h1>
    <p class="sub">Enter your email address and we'll send you a recovery link.</p>
    <div class="error" th:if="${error}" th:text="${error}"></div>
    <form th:action="@{/forgot-password}" method="post">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
        <button type="submit">Send reset link</button>
    </form>
    <a th:href="@{/login}" class="back">← Back to sign in</a>
</div>
</body>
</html>
