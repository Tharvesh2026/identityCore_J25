<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Inter',sans-serif; background:#f9fafb; margin:0; }
        .card { max-width:400px; margin:80px auto; background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:36px; }
        h1 { font-size:20px; margin:0 0 6px; color:#111827; }
        p.sub { font-size:13.5px; color:#6b7280; margin:0 0 24px; }
        label { font-size:13px; color:#374151; display:block; margin-bottom:6px; }
        input[type=password] { width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; margin-bottom:16px; box-sizing:border-box; }
        button { width:100%; padding:11px; background:#4f46e5; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; }
        .back { display:block; text-align:center; margin-top:18px; font-size:13px; color:#4f46e5; text-decoration:none; }
        .error { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:16px; }
        .invalid { text-align:center; color:#6b7280; font-size:13.5px; }
    </style>
</head>
<body>
<div class="card">
    <div th:if="${valid}">
        <h1>Choose a new password</h1>
        <p class="sub">Make it something you haven't used before.</p>
        <div class="error" th:if="${error}" th:text="${error}"></div>
        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">
            <label for="password">New password</label>
            <input type="password" id="password" name="password" required minlength="8">
            <label for="confirmPassword">Confirm new password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8">
            <button type="submit">Reset password</button>
        </form>
    </div>
    <div th:unless="${valid}">
        <h1>Link expired or invalid</h1>
        <p class="invalid">This reset link is no longer valid. Please request a new one.</p>
        <a th:href="@{/forgot-password}" class="back">Request a new link</a>
    </div>
</div>
</body>
</html>
