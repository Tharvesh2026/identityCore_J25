<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Error</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
    <link rel="stylesheet" th:href="@{/assets/icore.css}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
            padding: 20px;
        }

        .error-card {
            max-width: 460px;
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 40px 36px;
            text-align: center;
        }

        .error-code {
            font-size: 72px;
            font-weight: 700;
            color: var(--brand);
            line-height: 1;
            margin-bottom: 8px;
            font-family: var(--mono);
        }

        .error-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 10px;
        }

        .error-msg {
            font-size: 14px;
            color: var(--text-3);
            line-height: 1.6;
            margin-bottom: 28px;
        }
    </style>
</head>

<body>

    <div class="error-card">
        <div class="error-code" th:text="${status ?: '500'}">500</div>
        <div class="error-title" th:text="${error ?: 'Something went wrong'}">Something went wrong</div>
        <div class="error-msg" th:text="${message ?: 'An unexpected error occurred. Please try again later.'}">
            An unexpected error occurred.
        </div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <a href="/welcome" class="ic-btn">
                <i class="ti ti-home"></i> Home
            </a>
            <a href="/login" class="ic-btn ic-btn-primary">
                <i class="ti ti-login"></i> Sign in
            </a>
        </div>
    </div>

</body>

</html>
