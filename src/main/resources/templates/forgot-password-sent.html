<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Check your email</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Inter',sans-serif; background:#f9fafb; margin:0; }
        .card { max-width:400px; margin:80px auto; background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:36px; text-align:center; }
        h1 { font-size:20px; margin:0 0 10px; color:#111827; }
        p { font-size:13.5px; color:#6b7280; line-height:1.6; }
        a.back { display:inline-block; margin-top:20px; font-size:13px; color:#4f46e5; text-decoration:none; }
    </style>
</head>
<body>
<div class="card">
    <h1>Check your email</h1>
    <p>
        If an account exists for <strong th:text="${email}"></strong>, we've sent a link to reset your password.
        It expires in 30 minutes.
    </p>
    <a th:href="@{/login}" class="back">← Back to sign in</a>
</div>
</body>
</html>
