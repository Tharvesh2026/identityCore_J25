<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Verify Email</title>
    <meta name="description" content="Verify your email address using the 6-digit code sent to you.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
    <link rel="stylesheet" th:href="@{/assets/icore.css}">

    <style>
        html, body { height: 100%; }
        body {
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }
        .auth-shell {
            display: flex;
            width: 440px;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            background: var(--surface);
            flex-direction: column;
            padding: 40px 30px;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo-icon {
            width: 48px; height: 48px;
            background: var(--brand-light);
            border-radius: 12px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }
        .logo-icon i { color: var(--brand); font-size: 24px; }
        .title { font-size: 22px; font-weight: 600; color: var(--text-1); margin-bottom: 6px; }
        .subtitle { font-size: 13.5px; color: var(--text-3); line-height: 1.6; }
        .otp-input-container {
            margin: 28px 0;
            text-align: center;
        }
        .otp-input {
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 12px;
            text-align: center;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border, #E5E7EB);
            background: var(--surface-2);
            color: var(--brand);
            box-sizing: border-box;
            outline: none;
            transition: border-color .15s;
        }
        .otp-input:focus {
            border-color: var(--brand);
        }
        .otp-input::placeholder {
            letter-spacing: normal;
            font-size: 16px;
            font-weight: 400;
            color: var(--text-3);
        }
        .btn-verify {
            width: 100%;
            padding: 12px;
            justify-content: center;
            font-size: 14.5px;
            border-radius: var(--radius-sm);
            font-weight: 500;
        }
        .resend-section {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-3);
        }
        .resend-btn {
            background: none;
            border: none;
            color: var(--brand);
            font-weight: 500;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
        }
        .resend-btn:hover {
            color: #4338ca;
        }
    </style>
</head>
<body>

<div class="auth-shell">
    <div class="logo-section">
        <div class="logo-icon"><i class="ti ti-mail-check"></i></div>
        <div class="title">Verify your email</div>
        <div class="subtitle">
            We have sent a 6-digit verification code to <br>
            <strong style="color: var(--text-2);" th:text="${email}">you@example.com</strong>
        </div>
    </div>

    <!-- Alert messages -->
    <div class="ic-alert ic-alert-error" th:if="${error}" style="margin-bottom: 16px;">
        <i class="ti ti-alert-circle"></i>
        <span th:text="${error}">Invalid verification code.</span>
    </div>
    <div class="ic-alert ic-alert-success" th:if="${success}" style="margin-bottom: 16px;">
        <i class="ti ti-circle-check"></i>
        <span th:text="${success}">OTP resent successfully.</span>
    </div>

    <form th:action="@{/verify-otp}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="otp-input-container">
            <input type="text" class="otp-input" name="otp" placeholder="••••••" 
                   maxlength="6" autocomplete="one-time-code" required autofocus pattern="\d{6}">
        </div>

        <button type="submit" class="ic-btn ic-btn-primary btn-verify">
            <i class="ti ti-shield-check"></i> Verify Account
        </button>
    </form>

    <div class="resend-section">
        Didn't receive the code? 
        <form th:action="@{/verify-otp/resend}" method="post" style="display: inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="resend-btn">Resend Code</button>
        </form>
    </div>

    <div style="text-align: center; margin-top: 24px; font-size: 12.5px;">
        <a href="/logout" style="color: var(--text-3); text-decoration: none;">
            <i class="ti ti-logout"></i> Sign out and use different account
        </a>
    </div>
</div>

<script>
    // Automatically filter non-numeric input from the OTP box
    const otpInput = document.querySelector('.otp-input');
    if (otpInput) {
        otpInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    }
</script>

</body>
</html>
