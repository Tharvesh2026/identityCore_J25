<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Secure Identity System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
    <link rel="stylesheet" href="assets/icore.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 p-3">

    <div class="card p-4 shadow-lg" style="width:100%; max-width:420px;">
        
        <!-- Header -->
        <div class="text-center mb-4">
            <div class="logo-mark mx-auto mb-3" style="width:48px; height:48px;">
                <i class="ti ti-cloud fs-4"></i>
            </div>
            <h1 class="h4 card-title mb-1">Welcome to i.Core</h1>
            <p class="text-secondary small">Secure Identity & Access Management</p>
        </div>

        <!-- Tabs -->
        <div class="nav nav-tabs nav-fill mb-3" id="authTabs" role="tablist">
            <button class="nav-link active text-white" id="tab-login" onclick="switchTab('login')" type="button" style="border:none; border-bottom: 2px solid var(--brand); font-weight:500;">Sign in</button>
            <button class="nav-link text-secondary" id="tab-register" onclick="switchTab('register')" type="button" style="border:none; border-bottom: 2px solid transparent; font-weight:500;">Create account</button>
        </div>

        <!-- Alert messages -->
        <div id="alert-box" class="alert d-none align-items-center gap-2 py-2 px-3 small mb-3" role="alert">
            <i id="alert-icon" class="ti"></i>
            <span id="alert-msg"></span>
        </div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-mail"></i></span>
                    <input type="email" id="login-email" class="form-control" placeholder="name@company.com" required>
                </div>
            </div>
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label mb-0">Password</label>
                    <a href="forgot-password.html" class="text-decoration-none small" style="color:var(--brand); font-weight:500;">Forgot?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-lock"></i></span>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="login-remember" style="accent-color: var(--brand);">
                <label class="form-check-label small text-secondary" for="login-remember">
                    Keep me signed in
                </label>
            </div>
            <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2">
                <i class="ti ti-login"></i> Sign in
            </button>
        </form>

        <!-- Register Form -->
        <form id="register-form" onsubmit="handleRegister(event)" class="d-none">
            <div class="mb-3">
                <label class="form-label">Full name</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-user"></i></span>
                    <input type="text" id="reg-name" class="form-control" placeholder="John Doe" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-at"></i></span>
                    <input type="text" id="reg-username" class="form-control" placeholder="johndoe" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-mail"></i></span>
                    <input type="email" id="reg-email" class="form-control" placeholder="john@example.com" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-lock"></i></span>
                    <input type="password" id="reg-password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                </div>
            </div>
            <p class="text-secondary small mb-3" style="line-height:1.4;">
                By signing up, you agree to our 
                <a href="terms.html" class="text-decoration-none" style="color:var(--brand);">Terms of Service</a> and 
                <a href="privacy.html" class="text-decoration-none" style="color:var(--brand);">Privacy Policy</a>.
            </p>
            <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2">
                <i class="ti ti-user-plus"></i> Create account
            </button>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Check URL params on page load
        window.addEventListener("DOMContentLoaded", () => {
            apiFetch("/user/welcome", { bypassAuthCheck: true })
                .then(res => {
                    if (res && res.success) {
                        window.location.href = "welcome.html";
                    }
                }).catch(() => {});

            const params = new URLSearchParams(window.location.search);
            if (params.get("error")) {
                showAlert("danger", params.get("error"));
            } else if (params.get("logout")) {
                showAlert("success", "You have logged out successfully.");
            } else if (params.get("reset") === "success") {
                showAlert("success", "Password reset successfully. Please login.");
            }

            const tab = params.get("tab");
            if (tab === "register") {
                switchTab("register");
            }
        });

        function switchTab(tab) {
            const loginForm = document.getElementById("login-form");
            const registerForm = document.getElementById("register-form");
            const tabLogin = document.getElementById("tab-login");
            const tabRegister = document.getElementById("tab-register");

            if (tab === "login") {
                loginForm.classList.remove("d-none");
                registerForm.classList.add("d-none");
                tabLogin.className = "nav-link active text-white";
                tabLogin.style.borderBottomColor = "var(--brand)";
                tabRegister.className = "nav-link text-secondary";
                tabRegister.style.borderBottomColor = "transparent";
            } else {
                loginForm.classList.add("d-none");
                registerForm.classList.remove("d-none");
                tabRegister.className = "nav-link active text-white";
                tabRegister.style.borderBottomColor = "var(--brand)";
                tabLogin.className = "nav-link text-secondary";
                tabLogin.style.borderBottomColor = "transparent";
            }
            // Clear alerts on switch
            document.getElementById("alert-box").classList.add("d-none");
        }

        function showAlert(type, message) {
            const alertBox = document.getElementById("alert-box");
            const alertIcon = document.getElementById("alert-icon");
            const alertMsg = document.getElementById("alert-msg");

            alertBox.classList.remove("d-none", "alert-success", "alert-danger");
            alertMsg.textContent = message;

            if (type === "success") {
                alertBox.classList.add("alert-success", "d-flex");
                alertIcon.className = "ti ti-circle-check";
            } else {
                alertBox.classList.add("alert-danger", "d-flex");
                alertIcon.className = "ti ti-alert-circle";
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;
            const rememberMe = document.getElementById("login-remember").checked;

            try {
                const res = await apiFetch("/login", {
                    method: "POST",
                    bypassAuthCheck: true,
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: new URLSearchParams({
                        email: email,
                        password: password,
                        "remember-me": rememberMe ? "on" : "off"
                    }).toString()
                });

                if (res && res.success) {
                    window.location.href = "welcome.html";
                } else {
                    showAlert("danger", "Failed to login. Please try again.");
                }
            } catch (err) {
                showAlert("danger", err.message || "Invalid email or password.");
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById("reg-name").value;
            const username = document.getElementById("reg-username").value;
            const email = document.getElementById("reg-email").value;
            const password = document.getElementById("reg-password").value;

            try {
                const res = await apiFetch("/user/register", {
                    method: "POST",
                    body: JSON.stringify({
                        name: name,
                        username: username,
                        email: email,
                        password: password
                    })
                });

                if (res && res.success) {
                    showAlert("success", "Registration successful. Please sign in.");
                    switchTab("login");
                }
            } catch (err) {
                showAlert("danger", err.message || "Registration failed.");
            }
        }
    </script>
</body>
</html>
