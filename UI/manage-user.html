<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Manage User</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
    <link rel="stylesheet" href="assets/icore.css">
</head>
<body>

<div class="d-flex min-vh-100">

    <!-- Dynamic Sidebar -->
    <aside class="sidebar-aside" id="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content flex-grow-1 p-4">
        
        <!-- Topbar -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div class="breadcrumb-container mb-0">
                <span>i.Core</span>
                <span class="breadcrumb-sep">/</span>
                <a href="users.html" class="text-secondary text-decoration-none">Users</a>
                <span class="breadcrumb-sep">/</span>
                <span class="text-white" id="breadcrumb-username">username</span>
            </div>
            <div>
                <a href="users.html" class="btn btn-secondary btn-sm d-flex align-items-center gap-1">
                    <i class="ti ti-arrow-left"></i> Back to users
                </a>
            </div>
        </div>

        <!-- Flash alerts -->
        <div id="alert-box" class="alert d-none align-items-center gap-2 py-2 px-3 small mb-4" role="alert">
            <i id="alert-icon" class="ti"></i>
            <span id="alert-msg"></span>
        </div>

        <!-- Profile header card banner -->
        <div class="card mb-4 overflow-hidden">
            <div style="height:72px; background: linear-gradient(135deg, #4C1D95 0%, #7C3AED 60%, #8B5CF6 100%); position:relative;"></div>
            <div class="px-4 pb-3" style="position:relative;">
                <div class="avatar-holder d-flex align-items-center justify-content-center text-white fw-bold border border-3 border-dark" id="header-avatar" 
                     style="position:absolute; top:-26px; left:24px; width:52px; height:52px; border-radius:10px; background-color: var(--brand); font-size:18px;">
                    U
                </div>
                <div style="padding-top:36px; display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px;">
                    <div>
                        <div class="fs-6 fw-bold text-white" id="header-name">Name</div>
                        <div class="small text-secondary mt-1">
                            @<span id="header-username">username</span> &nbsp;&bull;&nbsp; <span id="header-email">email</span>
                        </div>
                        <div class="mt-2 d-flex gap-2 align-items-center flex-wrap">
                            <span class="theme-tag tag-generic" id="header-role-tag">ROLE</span>
                            <span class="theme-tag tag-active" id="header-status-tag">ACTIVE</span>
                        </div>
                    </div>
                    <div>
                        <div class="text-center p-2 border border-secondary border-opacity-25 rounded bg-dark" style="min-width: 80px;">
                            <div class="small text-secondary" style="font-size:10px;">User ID</div>
                            <div class="font-monospace fw-semibold text-white" style="font-size: 13px;">#<span id="header-user-id">0</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Panels Grid Layout -->
        <div class="row g-4">

            <!-- 1. Role Assignment -->
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <h5 class="card-title fs-6 fw-semibold mb-3 d-flex align-items-center gap-2">
                        <i class="ti ti-shield text-primary"></i> Role Assignment
                    </h5>
                    <form onsubmit="handleUpdateRole(event)" class="d-flex flex-column h-100 justify-content-between">
                        <div class="mb-3">
                            <label class="form-label">Select System Role</label>
                            <select id="role-select" class="form-select" required>
                                <option value="">Loading roles...</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center">
                            Update role
                        </button>
                    </form>
                </div>
            </div>

            <!-- 2. Account Access (Status) -->
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <h5 class="card-title fs-6 fw-semibold mb-3 d-flex align-items-center gap-2">
                        <i class="ti ti-user-x text-primary"></i> Account Access
                    </h5>
                    <form onsubmit="handleUpdateStatus(event)" class="d-flex flex-column h-100 justify-content-between">
                        <div class="mb-3">
                            <label class="form-label">Select Status</label>
                            <select id="status-select" class="form-select" required>
                                <option value="ACTIVE">ACTIVE — Enabled</option>
                                <option value="INACTIVE">INACTIVE — Disabled</option>
                                <option value="SUSPENDED">SUSPENDED — Blocked</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center">
                            Update status
                        </button>
                    </form>
                </div>
            </div>

            <!-- 3. Credentials reset -->
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <h5 class="card-title fs-6 fw-semibold mb-3 d-flex align-items-center gap-2">
                        <i class="ti ti-key text-primary"></i> Credentials Reset
                    </h5>
                    <form onsubmit="handleResetPassword(event)" class="d-flex flex-column h-100 justify-content-between">
                        <div class="mb-3">
                            <label class="form-label">New Temp Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-lock"></i></span>
                                <input type="password" id="temp-password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 d-flex align-items-center justify-content-center">
                            Reset password
                        </button>
                    </form>
                </div>
            </div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
    let userId = null;

    window.addEventListener("DOMContentLoaded", async () => {
        // Authenticate user
        const user = await requireAuth();
        if (!user) return;

        // Render sidebar
        initNavbar(user);

        // Get User ID from params
        const params = new URLSearchParams(window.location.search);
        userId = params.get("id");
        if (!userId) {
            window.location.href = "users.html";
            return;
        }

        // Fetch target user and roles details
        await loadUserData();
    });

    async function loadUserData() {
        try {
            const res = await apiFetch(`/user/manage?id=${userId}`);
            if (res && res.success) {
                const data = res.data;
                const su = data.selectedUser;

                // Set headers
                document.getElementById("breadcrumb-username").textContent = su.username;
                document.getElementById("header-name").textContent = su.name;
                document.getElementById("header-avatar").textContent = su.name.charAt(0).toUpperCase();
                document.getElementById("header-username").textContent = su.username;
                document.getElementById("header-email").textContent = su.email;
                document.getElementById("header-user-id").textContent = su.id;

                const roleEl = document.getElementById("header-role-tag");
                roleEl.textContent = su.role;
                roleEl.className = su.role && su.role.includes("ADMIN") ? "theme-tag tag-admin" : "theme-tag tag-generic";

                const statusEl = document.getElementById("header-status-tag");
                statusEl.textContent = su.status;
                statusEl.className = "ACTIVE".equalsIgnoreCase(su.status) ? "theme-tag tag-active" : "theme-tag tag-inactive";

                // Set status dropdown
                document.getElementById("status-select").value = su.status;

                // Load roles dropdown options
                const roleSelect = document.getElementById("role-select");
                roleSelect.innerHTML = "";
                data.roles.forEach(r => {
                    const opt = document.createElement("option");
                    opt.value = r.id;
                    opt.textContent = r.roleName;
                    if (r.roleName === su.role) {
                        opt.selected = true;
                    }
                    roleSelect.appendChild(opt);
                });
            }
        } catch (e) {
            showAlert("danger", "Failed to load user management details: " + e.message);
        }
    }

    function showAlert(type, msg) {
        const alertBox = document.getElementById("alert-box");
        const alertIcon = document.getElementById("alert-icon");
        const alertMsg = document.getElementById("alert-msg");

        alertBox.classList.remove("d-none", "alert-success", "alert-danger");
        alertMsg.textContent = msg;

        if (type === "success") {
            alertBox.classList.add("alert-success", "d-flex");
            alertIcon.className = "ti ti-circle-check";
        } else {
            alertBox.classList.add("alert-danger", "d-flex");
            alertIcon.className = "ti ti-alert-circle";
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function handleUpdateRole(e) {
        e.preventDefault();
        const roleId = document.getElementById("role-select").value;

        try {
            const res = await apiFetch("/auth/update-role", {
                method: "POST",
                body: JSON.stringify({ userId: Number(userId), roleId: Number(roleId) })
            });

            if (res && res.success) {
                showAlert("success", "User role updated successfully.");
                await loadUserData();
            }
        } catch (err) {
            showAlert("danger", err.message || "Failed to update role.");
        }
    }

    async function handleUpdateStatus(e) {
        e.preventDefault();
        const status = document.getElementById("status-select").value;

        try {
            const res = await apiFetch("/auth/update-status", {
                method: "POST",
                body: JSON.stringify({ userId: Number(userId), status })
            });

            if (res && res.success) {
                showAlert("success", "User status updated successfully.");
                await loadUserData();
            }
        } catch (err) {
            showAlert("danger", err.message || "Failed to update status.");
        }
    }

    async function handleResetPassword(e) {
        e.preventDefault();
        const password = document.getElementById("temp-password").value;

        try {
            const res = await apiFetch("/auth/reset-password", {
                method: "POST",
                body: JSON.stringify({ userId: Number(userId), newPassword: password })
            });

            if (res && res.success) {
                showAlert("success", "User password reset successfully.");
                document.getElementById("temp-password").value = "";
            }
        } catch (err) {
            showAlert("danger", err.message || "Failed to reset password.");
        }
    }

    // Polyfill
    String.prototype.equalsIgnoreCase = function (compareString) {
        return this.toLowerCase() === compareString.toLowerCase();
    };
</script>
</body>
</html>
