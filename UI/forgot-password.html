<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
    <link rel="stylesheet" href="assets/icore.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 p-3">

    <div class="card p-4 shadow-lg" style="width:100%; max-width:400px;">
        
        <!-- Header -->
        <div class="text-center mb-4">
            <div class="logo-mark mx-auto mb-3" style="width:48px; height:48px;">
                <i class="ti ti-key fs-4"></i>
            </div>
            <h1 class="h4 card-title mb-1">Forgot your password?</h1>
            <p class="text-secondary small mb-0" style="line-height:1.4;">Enter your email address and we'll send you a secure link to reset your password.</p>
        </div>

        <!-- Alert messages -->
        <div id="alert-box" class="alert d-none align-items-center gap-2 py-2 px-3 small mb-3" role="alert">
            <i id="alert-icon" class="ti"></i>
            <span id="alert-msg"></span>
        </div>

        <!-- Forgot Form -->
        <form onsubmit="handleForgotPassword(event)">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-mail"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2 mb-3">
                <i class="ti ti-send"></i> Send reset link
            </button>
            <div class="text-center">
                <a href="index.html" class="text-decoration-none small d-inline-flex align-items-center gap-1" style="color:var(--brand); font-weight:500;">
                    <i class="ti ti-arrow-left"></i> Back to sign in
                </a>
            </div>
        </form>

    </div>

    <script src="js/api.js"></script>
    <script>
        function showAlert(type, msg) {
            const alertBox = document.getElementById("alert-box");
            const alertIcon = document.getElementById("alert-icon");
            const alertMsg = document.getElementById("alert-msg");

            alertBox.classList.remove("d-none", "alert-success", "alert-danger");
            alertMsg.textContent = msg;

            if (type === "success") {
                alertBox.classList.add("alert-success", "d-flex");
                alertIcon.className = "ti ti-circle-check";
            } else {
                alertBox.classList.add("alert-danger", "d-flex");
                alertIcon.className = "ti ti-alert-circle";
            }
        }

        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById("email").value;

            try {
                const res = await apiFetch("/user/forgot-password", {
                    method: "POST",
                    body: JSON.stringify({ email })
                });

                if (res && res.success) {
                    showAlert("success", "A password reset link has been successfully dispatched to your email address (if registered).");
                    document.getElementById("email").value = "";
                }
            } catch (err) {
                showAlert("danger", err.message || "Failed to submit request.");
            }
        }
    </script>
</body>
</html>
