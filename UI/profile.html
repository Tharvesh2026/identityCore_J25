<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Profile Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
    <link rel="stylesheet" href="assets/icore.css">
</head>
<body>

<div class="d-flex min-vh-100">
    
    <!-- Dynamic Sidebar -->
    <aside class="sidebar-aside" id="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content flex-grow-1 p-4">
        
        <!-- Topbar -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div class="breadcrumb-container mb-0">
                <span>i.Core</span>
                <span class="breadcrumb-sep">/</span>
                <span class="text-white">Profile</span>
            </div>
        </div>

        <!-- Flash alerts -->
        <div id="alert-box" class="alert d-none align-items-center gap-2 py-2 px-3 small mb-4" role="alert">
            <i id="alert-icon" class="ti"></i>
            <span id="alert-msg"></span>
        </div>

        <!-- Page header -->
        <div class="mb-4">
            <h2 class="page-title">Profile Settings</h2>
            <p class="page-sub">Manage your account information and password credentials.</p>
        </div>

        <!-- Profile Content Grid Layout -->
        <div class="row g-4">
            
            <!-- Left panel inputs -->
            <div class="col-lg-8">
                <div class="card p-4">
                    <!-- Nav Tabs -->
                    <ul class="nav nav-tabs nav-fill mb-4" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active text-white" id="tab-edit" onclick="switchProfileTab('edit')" type="button" style="border:none; border-bottom: 2px solid var(--brand); font-weight:500;">Edit Profile</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link text-secondary" id="tab-password" onclick="switchProfileTab('password')" type="button" style="border:none; border-bottom: 2px solid transparent; font-weight:500;">Security Credentials</button>
                        </li>
                    </ul>

                    <!-- Edit Profile Form -->
                    <form id="edit-profile-form" onsubmit="handleUpdateProfile(event)">
                        <div class="mb-3">
                            <label class="form-label">Full name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-user"></i></span>
                                <input type="text" id="profile-name-input" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-at"></i></span>
                                <input type="text" id="profile-username-input" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Email address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-mail"></i></span>
                                <input type="email" id="profile-email-input" class="form-control" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary d-flex align-items-center gap-2">
                            <i class="ti ti-device-floppy"></i> Save profile changes
                        </button>
                    </form>

                    <!-- Change Password Form -->
                    <form id="change-password-form" onsubmit="handleChangePassword(event)" class="d-none">
                        <div class="mb-3">
                            <label class="form-label">Current password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-lock"></i></span>
                                <input type="password" id="current-password" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">New password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-lock-open"></i></span>
                                <input type="password" id="new-password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Confirm new password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-lock-check"></i></span>
                                <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required minlength="6">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary d-flex align-items-center gap-2">
                            <i class="ti ti-key"></i> Update credentials
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right panel info tags -->
            <div class="col-lg-4">
                <div class="card p-4">
                    <h5 class="card-title fs-6 fw-semibold mb-3">Active Privileges</h5>
                    <div id="permissions-list" class="d-flex flex-column gap-2">
                        <!-- Injected dynamically -->
                    </div>
                </div>
            </div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
    let currentUser = null;

    window.addEventListener("DOMContentLoaded", async () => {
        // Authenticate user
        currentUser = await requireAuth();
        if (!currentUser) return;

        // Render sidebar
        initNavbar(currentUser);

        // Populate forms
        populateForm(currentUser);

        // Render permissions sidebar list
        const permContainer = document.getElementById("permissions-list");
        if (currentUser.permissions && currentUser.permissions.length > 0) {
            currentUser.permissions.forEach(p => {
                const badge = document.createElement("div");
                badge.className = "font-monospace p-2 border rounded border-secondary border-opacity-25 text-white-50";
                badge.style.fontSize = "11px";
                badge.style.backgroundColor = "var(--bg-black)";
                badge.textContent = p;
                permContainer.appendChild(badge);
            });
        } else {
            permContainer.innerHTML = `<span class="text-secondary small">No permissions assigned</span>`;
        }
    });

    function populateForm(user) {
        document.getElementById("profile-name-input").value = user.name;
        document.getElementById("profile-username-input").value = user.username;
        document.getElementById("profile-email-input").value = user.email;
    }

    function switchProfileTab(tab) {
        const editForm = document.getElementById("edit-profile-form");
        const passForm = document.getElementById("change-password-form");
        const tabEdit = document.getElementById("tab-edit");
        const tabPass = document.getElementById("tab-password");

        if (tab === "edit") {
            editForm.classList.remove("d-none");
            passForm.classList.add("d-none");
            tabEdit.className = "nav-link active text-white";
            tabEdit.style.borderBottomColor = "var(--brand)";
            tabPass.className = "nav-link text-secondary";
            tabPass.style.borderBottomColor = "transparent";
        } else {
            editForm.classList.add("d-none");
            passForm.classList.remove("d-none");
            tabPass.className = "nav-link active text-white";
            tabPass.style.borderBottomColor = "var(--brand)";
            tabEdit.className = "nav-link text-secondary";
            tabEdit.style.borderBottomColor = "transparent";
        }
        // Hide alerts
        document.getElementById("alert-box").classList.add("d-none");
    }

    function showAlert(type, msg) {
        const alertBox = document.getElementById("alert-box");
        const alertIcon = document.getElementById("alert-icon");
        const alertMsg = document.getElementById("alert-msg");

        alertBox.classList.remove("d-none", "alert-success", "alert-danger");
        alertMsg.textContent = msg;

        if (type === "success") {
            alertBox.classList.add("alert-success", "d-flex");
            alertIcon.className = "ti ti-circle-check";
        } else {
            alertBox.classList.add("alert-danger", "d-flex");
            alertIcon.className = "ti ti-alert-circle";
        }
        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function handleUpdateProfile(e) {
        e.preventDefault();
        const name = document.getElementById("profile-name-input").value;
        const username = document.getElementById("profile-username-input").value;
        const email = document.getElementById("profile-email-input").value;

        try {
            const res = await apiFetch("/auth/profile/update", {
                method: "POST",
                body: JSON.stringify({ name, username, email })
            });

            if (res && res.success) {
                currentUser = res.data;
                populateForm(currentUser);
                initNavbar(currentUser);
                showAlert("success", "Profile updated successfully.");
            }
        } catch (err) {
            showAlert("danger", err.message || "Failed to update profile.");
        }
    }

    async function handleChangePassword(e) {
        e.preventDefault();
        const currentPassword = document.getElementById("current-password").value;
        const newPassword = document.getElementById("new-password").value;
        const confirmPassword = document.getElementById("confirm-password").value;

        try {
            const res = await apiFetch("/auth/profile/change-password", {
                method: "POST",
                body: JSON.stringify({ currentPassword, newPassword, confirmPassword })
            });

            if (res && res.success) {
                showAlert("success", "Password updated successfully.");
                document.getElementById("change-password-form").reset();
            }
        } catch (err) {
            showAlert("danger", err.message || "Failed to update credentials.");
        }
    }
</script>
</body>
</html>
