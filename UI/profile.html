<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Profile Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
    <link rel="stylesheet" href="assets/icore.css">
    <style>
        .blur-overlay-container { position: relative; }
        .blur-content { filter: blur(4px); pointer-events: none; user-select: none; }
        .blur-overlay {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.45); color: #fff; font-size: 13px; font-weight: 500;
            text-align: center; padding: 20px; border-radius: 6px; z-index: 10;
        }
    </style>
</head>
<body>

<div class="d-flex min-vh-100">
    
    <!-- Dynamic Sidebar -->
    <aside class="sidebar-aside" id="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content flex-grow-1 p-4">
        
        <!-- Topbar -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div class="breadcrumb-container mb-0">
                <span>i.Core</span>
                <span class="breadcrumb-sep">/</span>
                <span class="text-white">Profile</span>
            </div>
        </div>

        <!-- Flash alerts -->
        <div id="alert-box" class="alert d-none align-items-center gap-2 py-2 px-3 small mb-4" role="alert">
            <i id="alert-icon" class="ti"></i>
            <span id="alert-msg"></span>
        </div>

        <!-- Page header -->
        <div class="mb-4">
            <h2 class="page-title">Profile Settings</h2>
            <p class="page-sub">Manage your account information and password credentials.</p>
        </div>

        <!-- Profile Content Grid Layout -->
        <div class="row g-4">
            
            <!-- Left panel inputs -->
            <div class="col-lg-8">
                <div class="card p-4">
                    <!-- Nav Tabs -->
                    <ul class="nav nav-tabs nav-fill mb-4" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active text-white" id="tab-edit" onclick="switchProfileTab('edit')" type="button" style="border:none; border-bottom: 2px solid var(--brand); font-weight:500;">Edit Profile</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link text-secondary" id="tab-password" onclick="switchProfileTab('password')" type="button" style="border:none; border-bottom: 2px solid transparent; font-weight:500;">Security Credentials</button>
                        </li>
                    </ul>

                    <!-- Edit Profile Wrapper -->
                    <div id="edit-profile-wrapper">
                        <form id="edit-profile-form" onsubmit="handleUpdateProfile(event)">
                            <div class="mb-3">
                                <label class="form-label">Full name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-user"></i></span>
                                    <input type="text" id="profile-name-input" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-at"></i></span>
                                    <input type="text" id="profile-username-input" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-mail"></i></span>
                                    <input type="email" id="profile-email-input" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Business Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-building"></i></span>
                                    <input type="text" id="profile-business-input" class="form-control" placeholder="Your business name">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Location</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-map-pin"></i></span>
                                    <input type="text" id="profile-location-input" class="form-control" placeholder="Your location">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary d-flex align-items-center gap-2">
                                <i class="ti ti-device-floppy"></i> Save profile changes
                            </button>
                        </form>
                    </div>

                    <!-- Change Password Wrapper -->
                    <div id="change-password-wrapper" class="d-none">
                        <form id="change-password-form" onsubmit="handleChangePassword(event)">
                            <div class="mb-3">
                                <label class="form-label">Current password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-lock"></i></span>
                                    <input type="password" id="current-password" class="form-control" placeholder="••••••••" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">New password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-lock-open"></i></span>
                                    <input type="password" id="new-password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Confirm new password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-lock-check"></i></span>
                                    <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required minlength="6">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary d-flex align-items-center gap-2">
                                <i class="ti ti-key"></i> Update credentials
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Right panel info tags -->
            <div class="col-lg-4">
                <!-- Account Status Card -->
                <div class="card p-4 mb-4" id="account-status-card">
                    <h5 class="card-title fs-6 fw-semibold mb-3">Account Status</h5>
                    <div class="d-flex justify-content-between py-2 border-bottom border-secondary border-opacity-25 align-items-center">
                        <span class="small text-secondary">Status</span>
                        <span class="badge" id="account-status-badge">Not verified</span>
                    </div>
                    <div class="d-flex justify-content-between py-2 border-bottom border-secondary border-opacity-25 align-items-center">
                        <span class="small text-secondary">Joined on</span>
                        <span class="small text-white" id="account-joined-date">N/A</span>
                    </div>
                    <div class="d-flex justify-content-between py-2 border-bottom border-secondary border-opacity-25 align-items-center">
                        <span class="small text-secondary">Auth Method</span>
                        <span class="small text-white" id="account-auth-method">N/A</span>
                    </div>
                    <div class="d-flex justify-content-between py-2 align-items-center d-none" id="account-verification-source-row">
                        <span class="small text-secondary">Verification</span>
                        <span class="small text-success fw-medium" id="account-verification-source">N/A</span>
                    </div>
                </div>

                <!-- Active Privileges Card -->
                <div class="card p-4" id="privileges-card">
                    <h5 class="card-title fs-6 fw-semibold mb-3">Active Privileges</h5>
                    <div id="permissions-list" class="d-flex flex-column gap-2">
                        <!-- Injected dynamically -->
                    </div>
                </div>
            </div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
    let currentUser = null;

    window.addEventListener("DOMContentLoaded", async () => {
        // Authenticate user
        currentUser = await requireAuth();
        if (!currentUser) return;

        // Render sidebar
        initNavbar(currentUser);

        // Populate forms
        populateForm(currentUser);

        // Render permissions sidebar list
        const permContainer = document.getElementById("permissions-list");
        if (currentUser.permissions && currentUser.permissions.length > 0) {
            currentUser.permissions.forEach(p => {
                const badge = document.createElement("div");
                badge.className = "font-monospace p-2 border rounded border-secondary border-opacity-25 text-white-50";
                badge.style.fontSize = "11px";
                badge.style.backgroundColor = "var(--bg-black)";
                badge.textContent = p;
                permContainer.appendChild(badge);
            });
        } else {
            permContainer.innerHTML = `<span class="text-secondary small">No permissions assigned</span>`;
        }

        // Apply metadata and status
        const statusBadge = document.getElementById("account-status-badge");
        if (currentUser.verified) {
            statusBadge.className = "badge bg-success";
            statusBadge.textContent = "Verified";
            
            // Show verification source
            document.getElementById("account-verification-source-row").classList.remove("d-none");
            const prov = currentUser.provider || 'LOCAL';
            const provName = prov === 'LOCAL' ? 'tharbytes.io' : (prov === 'GOOGLE' ? 'Google' : 'GitHub');
            document.getElementById("account-verification-source").textContent = "You're verified with " + provName;
        } else {
            statusBadge.className = "badge bg-warning text-dark";
            statusBadge.textContent = "Not verified";
        }
        
        if (currentUser.createdAt) {
            document.getElementById("account-joined-date").textContent = new Date(currentUser.createdAt).toLocaleString();
        }
        
        const prov = currentUser.provider || 'LOCAL';
        document.getElementById("account-auth-method").textContent = prov === 'LOCAL' ? 'Form Registration' : prov.charAt(0) + prov.slice(1).toLowerCase() + ' OAuth';

        // Apply blur wrappers dynamically if not verified
        if (!currentUser.verified) {
            // Blur privileges card
            const privilegesCard = document.getElementById("privileges-card");
            if (privilegesCard) {
                privilegesCard.classList.add("blur-overlay-container");
                const innerHtml = privilegesCard.innerHTML;
                privilegesCard.innerHTML = `<div class="blur-content">${innerHtml}</div><div class="blur-overlay"><span><i class="ti ti-lock" style="font-size:16px; vertical-align:middle; margin-right:4px;"></i> Verify to see your Access and permission</span></div>`;
            }
            
            // Blur edit profile wrapper
            const editWrapper = document.getElementById("edit-profile-wrapper");
            if (editWrapper) {
                editWrapper.classList.add("blur-overlay-container");
                const innerHtml = editWrapper.innerHTML;
                editWrapper.innerHTML = `<div class="blur-content">${innerHtml}</div><div class="blur-overlay"><span><i class="ti ti-lock" style="font-size:16px; vertical-align:middle; margin-right:4px;"></i> Verify to edit your account info</span></div>`;
            }

            // Blur change password wrapper
            const passWrapper = document.getElementById("change-password-wrapper");
            if (passWrapper) {
                passWrapper.classList.add("blur-overlay-container");
                const innerHtml = passWrapper.innerHTML;
                passWrapper.innerHTML = `<div class="blur-content">${innerHtml}</div><div class="blur-overlay"><span><i class="ti ti-lock" style="font-size:16px; vertical-align:middle; margin-right:4px;"></i> Verify to change password</span></div>`;
            }
        } else if (currentUser.provider !== 'LOCAL') {
            // If verified but not local (OAuth user), blur the password wrapper
            const passWrapper = document.getElementById("change-password-wrapper");
            if (passWrapper) {
                passWrapper.classList.add("blur-overlay-container");
                const innerHtml = passWrapper.innerHTML;
                const provLabel = currentUser.provider === 'GOOGLE' ? 'Google' : 'GitHub';
                passWrapper.innerHTML = `<div class="blur-content">${innerHtml}</div><div class="blur-overlay"><span><i class="ti ti-brand-oauth" style="font-size:16px; vertical-align:middle; margin-right:4px;"></i> Your account is connected with ${provLabel}.</span></div>`;
            }
        }
    });

    function populateForm(user) {
        document.getElementById("profile-name-input").value = user.name;
        document.getElementById("profile-username-input").value = user.username;
        document.getElementById("profile-email-input").value = user.email;
        document.getElementById("profile-business-input").value = user.businessName || '';
        document.getElementById("profile-location-input").value = user.location || '';
    }

    function switchProfileTab(tab) {
        const editForm = document.getElementById("edit-profile-wrapper");
        const passForm = document.getElementById("change-password-wrapper");
        const tabEdit = document.getElementById("tab-edit");
        const tabPass = document.getElementById("tab-password");

        if (tab === "edit") {
            editForm.classList.remove("d-none");
            passForm.classList.add("d-none");
            tabEdit.className = "nav-link active text-white";
            tabEdit.style.borderBottomColor = "var(--brand)";
            tabPass.className = "nav-link text-secondary";
            tabPass.style.borderBottomColor = "transparent";
        } else {
            editForm.classList.add("d-none");
            passForm.classList.remove("d-none");
            tabPass.className = "nav-link active text-white";
            tabPass.style.borderBottomColor = "var(--brand)";
            tabEdit.className = "nav-link text-secondary";
            tabEdit.style.borderBottomColor = "transparent";
        }
        // Hide alerts
        document.getElementById("alert-box").classList.add("d-none");
    }

    function showAlert(type, msg) {
        const alertBox = document.getElementById("alert-box");
        const alertIcon = document.getElementById("alert-icon");
        const alertMsg = document.getElementById("alert-msg");

        alertBox.classList.remove("d-none", "alert-success", "alert-danger");
        alertMsg.textContent = msg;

        if (type === "success") {
            alertBox.classList.add("alert-success", "d-flex");
            alertIcon.className = "ti ti-circle-check";
        } else {
            alertBox.classList.add("alert-danger", "d-flex");
            alertIcon.className = "ti ti-alert-circle";
        }
        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function handleUpdateProfile(e) {
        e.preventDefault();
        const name = document.getElementById("profile-name-input").value;
        const username = document.getElementById("profile-username-input").value;
        const email = document.getElementById("profile-email-input").value;
        const businessName = document.getElementById("profile-business-input").value;
        const location = document.getElementById("profile-location-input").value;

        try {
            const res = await apiFetch("/auth/profile/update", {
                method: "POST",
                body: JSON.stringify({ name, username, email, businessName, location })
            });

            if (res && res.success) {
                currentUser = res.data;
                populateForm(currentUser);
                initNavbar(currentUser);
                showAlert("success", "Profile updated successfully.");
            }
        } catch (err) {
            showAlert("danger", err.message || "Failed to update profile.");
        }
    }

    async function handleChangePassword(e) {
        e.preventDefault();
        const currentPassword = document.getElementById("current-password").value;
        const newPassword = document.getElementById("new-password").value;
        const confirmPassword = document.getElementById("confirm-password").value;

        try {
            const res = await apiFetch("/auth/profile/change-password", {
                method: "POST",
                body: JSON.stringify({ currentPassword, newPassword, confirmPassword })
            });

            if (res && res.success) {
                showAlert("success", "Password updated successfully.");
                document.getElementById("change-password-form").reset();
            }
        } catch (err) {
            showAlert("danger", err.message || "Failed to update credentials.");
        }
    }
</script>
</body>
</html>
