<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Audit Logs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
    <link rel="stylesheet" href="assets/icore.css">
</head>
<body>

<div class="d-flex min-vh-100">

    <!-- Dynamic Sidebar -->
    <aside class="sidebar-aside" id="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content flex-grow-1 p-4">
        
        <!-- Topbar -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div class="breadcrumb-container mb-0">
                <span>i.Core</span>
                <span class="breadcrumb-sep">/</span>
                <span class="text-white">Audit Logs</span>
            </div>
            <button onclick="downloadRawLogs()" class="btn btn-secondary btn-sm d-flex align-items-center gap-1">
                <i class="ti ti-file-text"></i> Raw Log
            </button>
        </div>

        <!-- Page Header -->
        <div class="mb-4">
            <h2 class="page-title">Application Audit Logs</h2>
            <p class="page-sub">Authentication events, security activity and application logs.</p>
        </div>

        <!-- Stats Metrics Grid -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-lg-2.4 col-md-4">
                <div class="card metric-card p-3">
                    <div class="metric-label"><i class="ti ti-list-details"></i> Total</div>
                    <div class="metric-value fs-4" id="log-total">0</div>
                </div>
            </div>
            <div class="col-6 col-lg-2.4 col-md-4">
                <div class="card metric-card p-3">
                    <div class="metric-label"><i class="ti ti-key"></i> Logins</div>
                    <div class="metric-value fs-4" id="log-logins">0</div>
                </div>
            </div>
            <div class="col-6 col-lg-2.4 col-md-4">
                <div class="card metric-card p-3">
                    <div class="metric-label"><i class="ti ti-brand-google text-primary"></i> OAuth</div>
                    <div class="metric-value fs-4 text-primary" id="log-oauth">0</div>
                </div>
            </div>
            <div class="col-6 col-lg-2.4 col-md-4">
                <div class="card metric-card p-3">
                    <div class="metric-label"><i class="ti ti-alert-triangle text-warning"></i> Warnings</div>
                    <div class="metric-value fs-4 text-warning" id="log-warnings">0</div>
                </div>
            </div>
            <div class="col-12 col-lg-2.4 col-md-4">
                <div class="card metric-card p-3">
                    <div class="metric-label"><i class="ti ti-circle-x text-danger"></i> Errors</div>
                    <div class="metric-value fs-4 text-danger" id="log-errors">0</div>
                </div>
            </div>
        </div>

        <!-- Logs Table -->
        <div class="card p-3 mb-3">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th style="width:170px;">Event</th>
                            <th style="width:140px;">Timestamp</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody id="logs-tbody">
                        <tr>
                            <td colspan="3" class="text-center py-4 text-secondary">
                                <div class="spinner-border spinner-border-sm text-primary mb-2" role="status"></div><br>
                                Loading audit logs...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination Toolbar -->
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div class="small text-secondary">
                Showing <span id="pag-start">0</span> to <span id="pag-end">0</span> of <span id="pag-total">0</span> events
            </div>
            <div class="d-flex gap-2">
                <button id="btn-prev" onclick="goToPage(currentPage - 1)" class="btn btn-secondary btn-sm py-1 px-3 d-flex align-items-center gap-1" style="height:34px;">
                    <i class="ti ti-chevron-left"></i> Previous
                </button>
                <button id="btn-next" onclick="goToPage(currentPage + 1)" class="btn btn-secondary btn-sm py-1 px-3 d-flex align-items-center gap-1" style="height:34px;">
                    Next <i class="ti ti-chevron-right"></i>
                </button>
            </div>
        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
    let currentPage = 0;
    let totalPages = 1;

    window.addEventListener("DOMContentLoaded", async () => {
        // Authenticate user
        const user = await requireAuth();
        if (!user) return;

        // Render sidebar
        initNavbar(user);

        // Fetch logs page
        await fetchLogs(currentPage);
    });

    async function fetchLogs(page) {
        try {
            const res = await apiFetch(`/user/logs/structured?page=${page}`);
            if (res && res.success) {
                const data = res.data;
                currentPage = data.currentPage;
                totalPages = data.totalPages;

                // Set metrics
                const s = data.logStats || {};
                document.getElementById("log-total").textContent = s.totalEvents || 0;
                document.getElementById("log-logins").textContent = s.loginEvents || 0;
                document.getElementById("log-oauth").textContent = s.oauthLogins || 0;
                document.getElementById("log-warnings").textContent = s.warnings || 0;
                document.getElementById("log-errors").textContent = s.errors || 0;

                // Render Table rows
                renderLogsTable(data.logEntries || []);

                // Update Pagination states
                document.getElementById("btn-prev").disabled = !data.isHasPrev;
                document.getElementById("btn-next").disabled = !data.isHasNext;

                const startIdx = data.totalItems === 0 ? 0 : (currentPage * data.pageSize) + 1;
                const endIdx = Math.min(startIdx + data.pageSize - 1, data.totalItems);
                
                document.getElementById("pag-start").textContent = startIdx;
                document.getElementById("pag-end").textContent = endIdx;
                document.getElementById("pag-total").textContent = data.totalItems;
            }
        } catch (e) {
            console.error("Failed to load audit logs", e);
            document.getElementById("logs-tbody").innerHTML = `
                <tr>
                    <td colspan="3" class="text-center py-4 text-danger">
                        <i class="ti ti-alert-triangle fs-4 mb-2"></i><br>
                        Failed to load audit logs: ${e.message}
                    </td>
                </tr>
            `;
        }
    }

    function renderLogsTable(entries) {
        const tbody = document.getElementById("logs-tbody");
        tbody.innerHTML = "";

        if (entries.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="3" class="text-center py-4 text-secondary">
                        No audit log entries recorded.
                    </td>
                </tr>
            `;
            return;
        }

        entries.forEach(e => {
            const tr = document.createElement("tr");

            // Event icon + details wrapper
            const colorClass = e.colorClass || "system"; // warning, error, success, info, security, system
            const icon = e.eventIcon || "ti-settings";
            const label = e.eventLabel || "System Event";

            let tagHtml = "";
            if (e.user) {
                tagHtml = `<span class="theme-tag tag-generic font-monospace" style="font-size:10px; padding:0.5px 4px;">@${e.user}</span>`;
            }

            tr.innerHTML = `
                <td>
                    <div class="d-flex flex-column gap-1">
                        <span class="theme-tag tag-${colorClass} py-1" style="font-size:10.5px; width:fit-content;">
                            <i class="ti ${icon}"></i> ${label}
                        </span>
                        <span class="font-monospace text-secondary" style="font-size:9.5px; font-weight:500;">
                            ${e.logger}
                        </span>
                    </div>
                </td>
                <td>
                    <div class="d-flex flex-column gap-1 small">
                        <span class="fw-semibold text-white">${e.formattedTime}</span>
                        <span class="text-secondary" style="font-size:10.5px;">${e.formattedDate}</span>
                    </div>
                </td>
                <td>
                    <div class="d-flex flex-column gap-1">
                        <div class="font-monospace text-white-50" style="font-size:12px; line-height:1.45; white-space:pre-wrap;">${e.message}</div>
                        ${tagHtml ? `<div class="d-flex align-items-center gap-1">${tagHtml}</div>` : ""}
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function goToPage(page) {
        if (page < 0 || page >= totalPages) return;
        await fetchLogs(page);
    }

    function downloadRawLogs() {
        window.open(`${API_BASE_URL}/user/logs/raw`, "_blank");
    }
</script>
</body>
</html>
