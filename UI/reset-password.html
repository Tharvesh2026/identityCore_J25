<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
    <link rel="stylesheet" href="assets/icore.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 p-3">

    <!-- Form container -->
    <div class="card p-4 shadow-lg" style="width:100%; max-width:400px;">
        
        <!-- Loading state -->
        <div id="loading-state" class="text-center py-4">
            <div class="spinner-border text-primary mb-2" role="status"></div>
            <p class="small text-secondary mb-0">Verifying your reset token...</p>
        </div>

        <!-- Invalid token state -->
        <div id="invalid-state" class="text-center" style="display:none;">
            <div class="logo-mark mx-auto mb-3" style="width:48px; height:48px; background-color: rgba(220, 38, 38, 0.15) !important;">
                <i class="ti ti-alert-triangle fs-4 text-danger"></i>
            </div>
            <h1 class="h5 card-title mb-1">Link invalid or expired</h1>
            <p class="text-secondary small mb-4" style="line-height:1.45;">The password reset token is either invalid, already used, or expired. Please request a new link.</p>
            <a href="forgot-password.html" class="btn btn-primary w-100 text-decoration-none">
                Request new link
            </a>
        </div>

        <!-- Valid token state / Reset Form -->
        <div id="reset-state" style="display:none;">
            <div class="text-center mb-4">
                <div class="logo-mark mx-auto mb-3" style="width:48px; height:48px;">
                    <i class="ti ti-lock-open fs-4"></i>
                </div>
                <h1 class="h4 card-title mb-1">Reset your password</h1>
                <p class="text-secondary small mb-0">Enter your new account password credentials below.</p>
            </div>

            <!-- Alert messages -->
            <div id="alert-box" class="alert alert-danger d-none align-items-center gap-2 py-2 px-3 small mb-3" role="alert">
                <i class="ti ti-alert-circle"></i>
                <span id="alert-msg"></span>
            </div>

            <form onsubmit="handleResetPassword(event)">
                <div class="mb-3">
                    <label class="form-label">New password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-lock"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm new password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-lock-check"></i></span>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required minlength="6">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center">
                    Reset password
                </button>
            </form>
        </div>

    </div>

    <script src="js/api.js"></script>
    <script>
        let token = "";

        window.addEventListener("DOMContentLoaded", async () => {
            const params = new URLSearchParams(window.location.search);
            token = params.get("token");

            if (!token) {
                showState("invalid");
                return;
            }

            try {
                // Verify token via API
                const res = await apiFetch(`/user/reset-password/verify?token=${token}`);
                if (res && res.success && res.data.valid) {
                    showState("reset");
                } else {
                    showState("invalid");
                }
            } catch (err) {
                showState("invalid");
            }
        });

        function showState(state) {
            document.getElementById("loading-state").style.display = "none";
            document.getElementById("invalid-state").style.display = state === "invalid" ? "block" : "none";
            document.getElementById("reset-state").style.display = state === "reset" ? "block" : "none";
        }

        async function handleResetPassword(e) {
            e.preventDefault();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword) {
                showAlert("Passwords do not match");
                return;
            }

            try {
                const res = await apiFetch("/user/reset-password", {
                    method: "POST",
                    body: JSON.stringify({ token, password, confirmPassword })
                });

                if (res && res.success) {
                    window.location.href = "index.html?reset=success";
                }
            } catch (err) {
                showAlert(err.message || "Failed to reset password.");
            }
        }

        function showAlert(msg) {
            const alertBox = document.getElementById("alert-box");
            const alertMsg = document.getElementById("alert-msg");
            alertBox.classList.remove("d-none");
            alertBox.classList.add("d-flex");
            alertMsg.textContent = msg;
        }
    </script>
</body>
</html>
