<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Verify Email</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
    <link rel="stylesheet" href="assets/icore.css">
    <style>
        .otp-input {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 12px;
            text-align: center;
            color: var(--brand);
            background-color: var(--bs-body-bg);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 p-3">

    <div class="card p-4 shadow-lg" style="width:100%; max-width:420px;">
        
        <!-- Header -->
        <div class="text-center mb-4">
            <div class="logo-mark mx-auto mb-3" style="width:48px; height:48px; background-color: rgba(79, 70, 229, 0.15); color: var(--brand); display: flex; align-items: center; justify-content: center; border-radius: 12px;">
                <i class="ti ti-mail-check fs-4"></i>
            </div>
            <h1 class="h4 card-title mb-1">Verify your email</h1>
            <p class="text-secondary small">
                We have sent a 6-digit verification code to <br>
                <strong class="text-light" id="target-email">loading...</strong>
            </p>
        </div>

        <!-- Alert messages -->
        <div id="alert-box" class="alert d-none align-items-center gap-2 py-2 px-3 small mb-3" role="alert">
            <i id="alert-icon" class="ti"></i>
            <span id="alert-msg"></span>
        </div>

        <!-- Verification Form -->
        <form id="verify-form" onsubmit="handleVerify(event)">
            <div class="mb-4">
                <input type="text" id="otp-code" class="form-control form-control-lg otp-input text-center" 
                       placeholder="••••••" maxlength="6" autocomplete="one-time-code" required autofocus pattern="\d{6}">
            </div>

            <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2">
                <i class="ti ti-shield-check"></i> Verify Account
            </button>
        </form>

        <div class="text-center mt-3 small text-secondary">
            Didn't receive the code? 
            <a href="#" onclick="handleResend(event)" class="text-decoration-none" style="color:var(--brand); font-weight:500;">Resend Code</a>
        </div>

        <div class="text-center mt-4">
            <a href="#" onclick="apiLogout()" class="text-decoration-none small text-secondary">
                <i class="ti ti-logout"></i> Sign out
            </a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let currentUserEmail = "";

        // Check verification requirement on load
        window.addEventListener("DOMContentLoaded", async () => {
            try {
                // bypass normal auth check since unverified users will trigger a redirect loop if we check via welcome
                const res = await apiFetch("/user/profile", { bypassAuthCheck: true });
                if (res && res.success) {
                    if (res.data.status !== "PENDING_VERIFICATION") {
                        // Already verified, go to welcome
                        window.location.href = "welcome.html";
                        return;
                    }
                    currentUserEmail = res.data.email;
                    document.getElementById("target-email").textContent = currentUserEmail;
                }
            } catch (err) {
                // If not authenticated, redirect to login
                window.location.href = "index.html?error=Please+sign+in+first.";
            }

            // Filter non-numeric inputs
            const otpCode = document.getElementById("otp-code");
            if (otpCode) {
                otpCode.addEventListener("input", function() {
                    this.value = this.value.replace(/[^0-9]/g, '');
                });
            }
        });

        function showAlert(type, message) {
            const alertBox = document.getElementById("alert-box");
            const alertIcon = document.getElementById("alert-icon");
            const alertMsg = document.getElementById("alert-msg");

            alertBox.classList.remove("d-none", "alert-success", "alert-danger");
            alertMsg.textContent = message;

            if (type === "success") {
                alertBox.classList.add("alert-success", "d-flex");
                alertIcon.className = "ti ti-circle-check";
            } else {
                alertBox.classList.add("alert-danger", "d-flex");
                alertIcon.className = "ti ti-alert-circle";
            }
        }

        async function handleVerify(e) {
            e.preventDefault();
            const otp = document.getElementById("otp-code").value;

            try {
                const res = await apiFetch("/user/verify-otp", {
                    method: "POST",
                    body: JSON.stringify({ otp: otp })
                });

                if (res && res.success) {
                    showAlert("success", "Account verified successfully! Redirecting...");
                    setTimeout(() => {
                        window.location.href = "welcome.html";
                    }, 1500);
                }
            } catch (err) {
                showAlert("danger", err.message || "Invalid or expired verification code.");
            }
        }

        async function handleResend(e) {
            e.preventDefault();
            try {
                const res = await apiFetch("/user/verify-otp/resend", {
                    method: "POST"
                });
                if (res && res.success) {
                    showAlert("success", "A new verification code has been sent to your email.");
                }
            } catch (err) {
                showAlert("danger", err.message || "Failed to resend verification code.");
            }
        }
    </script>
</body>
</html>
