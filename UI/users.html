<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.Core — Users</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
    <link rel="stylesheet" href="assets/icore.css">
</head>
<body>

<div class="d-flex min-vh-100">

    <!-- Dynamic Sidebar -->
    <aside class="sidebar-aside" id="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content flex-grow-1 p-4">
        
        <!-- Topbar -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div class="breadcrumb-container mb-0">
                <span>i.Core</span>
                <span class="breadcrumb-sep">/</span>
                <span class="text-white">Users</span>
            </div>
        </div>

        <!-- Page Header -->
        <div class="mb-4">
            <h2 class="page-title">User Management</h2>
            <p class="page-sub">Manage registered users, roles and account access.</p>
        </div>

        <!-- Stats Metrics Grid -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card metric-card">
                    <div class="metric-label">
                        <i class="ti ti-users"></i> Total Users
                    </div>
                    <div class="metric-value" id="stat-total">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card metric-card">
                    <div class="metric-label">
                        <i class="ti ti-circle-check text-success"></i> Active Accounts
                    </div>
                    <div class="metric-value text-success" id="stat-active">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card metric-card">
                    <div class="metric-label">
                        <i class="ti ti-shield-check text-primary"></i> Admin Accounts
                    </div>
                    <div class="metric-value text-primary" id="stat-admin">0</div>
                </div>
            </div>
        </div>

        <!-- Search box -->
        <div class="mb-3">
            <div class="input-group">
                <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="ti ti-search"></i></span>
                <input type="text" id="searchUser" oninput="filterUsers()" class="form-control" placeholder="Search by name, username or email…">
            </div>
        </div>

        <!-- Users Table -->
        <div class="card p-3">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="usersTable">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>ID</th>
                            <th id="action-header" style="display:none;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr>
                            <td colspan="6" class="text-center py-4 text-secondary">
                                <div class="spinner-border spinner-border-sm text-primary mb-2" role="status"></div><br>
                                Loading users list...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
    let usersList = [];
    let canManage = false;
    const avatarColors = ["purple", "blue", "teal", "amber", "green"];

    window.addEventListener("DOMContentLoaded", async () => {
        // Authenticate user
        const user = await requireAuth();
        if (!user) return;

        // Render sidebar
        initNavbar(user);

        // Fetch users and metrics
        try {
            const res = await apiFetch("/user/users");
            if (res && res.success) {
                const d = res.data;
                usersList = d.users || [];
                canManage = d.canManageUsers;

                // Set metrics
                document.getElementById("stat-total").textContent = usersList.length;
                document.getElementById("stat-active").textContent = d.activeUsers;
                document.getElementById("stat-admin").textContent = d.adminUsers;

                // Conditionally show Action column header
                if (canManage) {
                    document.getElementById("action-header").style.display = "table-cell";
                }

                // Render Table rows
                renderUsersTable(usersList);
            }
        } catch (e) {
            console.error("Failed to load users", e);
            document.getElementById("users-tbody").innerHTML = `
                <tr>
                    <td colspan="6" class="text-center py-4 text-danger">
                        <i class="ti ti-alert-triangle fs-4 mb-2"></i><br>
                        Failed to load users: ${e.message}
                    </td>
                </tr>
            `;
        }
    });

    function renderUsersTable(users) {
        const tbody = document.getElementById("users-tbody");
        tbody.innerHTML = "";

        if (users.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6" class="text-center py-4 text-secondary">
                        No users match the search query.
                    </td>
                </tr>
            `;
            return;
        }

        users.forEach((u, index) => {
            const tr = document.createElement("tr");

            const avatarColor = avatarColors[index % 5];
            const initial = u.name ? u.name.charAt(0).toUpperCase() : "U";

            let actionHtml = "";
            if (canManage) {
                actionHtml = `
                    <td>
                        <a href="manage-user.html?id=${u.id}" class="btn btn-secondary btn-sm py-1 px-2" style="font-size:12.5px;">
                            <i class="ti ti-settings"></i> Manage
                        </a>
                    </td>
                `;
            }

            const isRoleAdmin = u.role && u.role.includes("ADMIN");
            const roleTagClass = isRoleAdmin ? "tag-admin" : "tag-generic";

            const isStatusActive = "ACTIVE".equalsIgnoreCase(u.status);
            const statusTagClass = isStatusActive ? "tag-active" : "tag-inactive";
            const statusIcon = isStatusActive ? '<i class="ti ti-circle-check"></i>' : '<i class="ti ti-circle-x"></i>';

            tr.innerHTML = `
                <td>
                    <div class="d-flex align-items-center gap-3">
                        <div class="d-flex align-items-center justify-content-center text-white font-weight-bold" 
                             style="width: 34px; height: 34px; border-radius: 6px; background-color: var(--brand); font-size: 13px;">
                            ${initial}
                        </div>
                        <div>
                            <div class="fw-semibold text-white" style="font-size:13.5px;">${u.name}</div>
                            <div class="small text-secondary">@${u.username}</div>
                        </div>
                    </div>
                </td>
                <td>
                    <span class="small text-secondary">${u.email}</span>
                </td>
                <td>
                    <span class="theme-tag ${roleTagClass}">${u.role}</span>
                </td>
                <td>
                    <span class="theme-tag ${statusTagClass}">
                        ${statusIcon} ${u.status}
                    </span>
                </td>
                <td>
                    <span class="font-monospace text-secondary" style="font-size:12.5px;">#${u.id}</span>
                </td>
                ${actionHtml}
            `;
            tbody.appendChild(tr);
        });
    }

    function filterUsers() {
        const query = document.getElementById("searchUser").value.toLowerCase().trim();
        if (!query) {
            renderUsersTable(usersList);
            return;
        }

        const filtered = usersList.filter(u => 
            (u.name && u.name.toLowerCase().includes(query)) ||
            (u.username && u.username.toLowerCase().includes(query)) ||
            (u.email && u.email.toLowerCase().includes(query))
        );
        renderUsersTable(filtered);
    }

    // Polyfill
    String.prototype.equalsIgnoreCase = function (compareString) {
        return this.toLowerCase() === compareString.toLowerCase();
    };
</script>
</body>
</html>
